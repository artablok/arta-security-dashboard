<!DOCTYPE html>
<html>
<head>
  <title>Arta Security Dashboard</title>
  <meta charset="UTF-8">

  <style>
    body {
      background:#0b0f19;
      color:white;
      font-family:Arial;
      margin:0;
      padding:0;
    }

    .header {
      padding:20px;
      background:#111827;
      border-bottom:1px solid #222;
    }

    .container {
      padding:20px;
    }

    .card {
      background:#111827;
      padding:15px;
      margin-bottom:10px;
      border-radius:10px;
      border:1px solid #222;
    }

    .status {
      color:#00ff99;
    }

    .warning {
      color:#ff4d4d;
    }

    .risk-high {
      color:#ff4d4d;
      font-weight:bold;
    }

    .risk-low {
      color:#00ff99;
      font-weight:bold;
    }

    input {
      padding:10px;
      width:300px;
      margin-bottom:10px;
      border-radius:5px;
      border:none;
    }

    #stats {
      margin-bottom:20px;
      font-weight:bold;
    }

    .new {
      border:1px solid #ff4d4d;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>🛡️ Arta Blockchain Security</h1>
  <p>Real-time scam token intelligence</p>
</div>

<div class="container">

<h2>🚨 Live Scam Tokens</h2>

<input id="search" placeholder="Search token...">

<p id="stats"></p>

<h3>🆕 New Threats (Last 24h)</h3>
<div id="new-threats">Loading...</div>

<div id="data">Loading...</div>

<h2>📊 System Status</h2>
<p class="status">🟢 Monitoring Active</p>
<p class="status">🟢 Database Online</p>
<p class="warning">⚠️ Threats Detected</p>

</div>

<script>
let allData = [];

function render() {
  let html = "";
  let newHtml = "";
  let searchValue = document.getElementById("search").value.toLowerCase();

  let total = 0;
  let highRisk = 0;

  let today = new Date().toISOString().split("T")[0];

  allData.forEach(network => {
    network.scam_tokens.forEach(t => {

      total++;

      let isNew = t.first_detected === today;

      let risk = "LOW";
      let riskClass = "risk-low";

      if (t.type === "Dust Attack" || t.type === "Impersonation") {
        risk = "HIGH";
        riskClass = "risk-high";
        highRisk++;
      }

      // 🔍 поиск
      if (
        !t.name.toLowerCase().includes(searchValue) &&
        !t.symbol.toLowerCase().includes(searchValue)
      ) return;

      let card = `
        <div class="card ${isNew ? 'new' : ''}">
          <b>${t.name}</b> (${t.symbol})<br>
          Type: ${t.type}<br>
          Address: ${t.address}<br>
          Network: ${network.network}<br>
          Status: ⚠️ ${t.status}<br>
          Risk Level: <span class="${riskClass}">${risk}</span>
          ${isNew ? "<br>🆕 NEW THREAT" : ""}
        </div>
      `;

      html += card;

      if (isNew) {
        newHtml += card;
      }

    });
  });

  document.getElementById("data").innerHTML = html;

  document.getElementById("new-threats").innerHTML =
    newHtml || "No new threats today";

  document.getElementById("stats").innerHTML = `
    Total threats: ${total} | High risk: ${highRisk}
  `;
}

fetch("https://raw.githubusercontent.com/artablok/crypto-security-research/main/database/solana.json")
.then(res => res.json())
.then(data => {
  allData = data;
  render();
});

document.getElementById("search").addEventListener("input", render);
</script>

</body>
</html>
